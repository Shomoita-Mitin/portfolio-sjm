<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Skillset ER Diagram</title>
<style>
:root{--red:#c8102e;--red-dark:#991b1b;--red-soft:#fff1f2;--ink:#1f2937;--muted:#64748b;--focus:#2563eb;--dim:.22}
*{box-sizing:border-box}body{margin:0;padding:14px;background:transparent;color:var(--ink);font-family:"Nunito",system-ui,-apple-system,BlinkMacSystemFont,Arial,sans-serif}button{font:inherit}.visually-hidden{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}.skillset-erd{width:100%;max-width:1180px;margin:0 auto}.toolbar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.toolbar-copy{margin:0;color:var(--muted);font-size:13px;font-weight:700}.clear-button{padding:8px 13px;color:var(--red-dark);background:var(--red-soft);border:1px solid #fecdd3;border-radius:9px;font-weight:900;cursor:pointer}.clear-button:hover{border-color:var(--red)}.clear-button:focus-visible,.entity-row:focus-visible{outline:3px solid var(--focus);outline-offset:3px}.diagram-shell{position:relative;height:690px;overflow:hidden;background:linear-gradient(#eef2f7 1px,transparent 1px),linear-gradient(90deg,#eef2f7 1px,transparent 1px),#fbfdff;background-size:28px 28px;border:1px solid #dbe3ec;border-radius:20px;box-shadow:0 16px 40px rgba(15,23,42,.09)}.relations{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}.relation-line{fill:none;stroke:#94a3b8;stroke-width:2;opacity:.66;transition:opacity .2s ease,stroke .2s ease,stroke-width .2s ease}.relation-line.active{stroke:var(--red);stroke-width:3.5;opacity:1}.relation-line.dimmed{opacity:.08}.entity-table{position:absolute;width:238px;overflow:hidden;background:#fff;border:1px solid #cbd5e1;border-radius:13px;box-shadow:0 9px 24px rgba(15,23,42,.09);z-index:3;transition:opacity .2s ease,transform .2s ease,border-color .2s ease,box-shadow .2s ease}.entity-table.connected{border-color:var(--red);box-shadow:0 0 0 4px rgba(200,16,46,.07),0 12px 28px rgba(15,23,42,.12)}.entity-table.dimmed{opacity:var(--dim)}.entity-header{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 11px;color:#fff;background:var(--red-dark);font-size:13px;font-weight:900}.entity-body{margin:0;padding:0;list-style:none}.entity-row{display:grid;grid-template-columns:minmax(0,1fr);width:100%;min-height:31px;align-items:center;padding:6px 11px;color:var(--ink);background:#fff;border:0;border-top:1px solid #edf2f7;text-align:left;cursor:pointer;transition:background-color .18s ease,color .18s ease,opacity .18s ease}.entity-row:hover{background:var(--red-soft)}.entity-row.active{color:var(--red-dark);background:var(--red-soft);font-weight:900}.entity-row.dimmed{opacity:.24}.field{overflow:hidden;font-size:11px;font-weight:800;text-overflow:ellipsis;white-space:nowrap}#roles{top:24px;left:24px}#skills{top:24px;left:340px}#technologies{top:24px;right:24px}#role-skills{bottom:25px;left:92px}#projects{bottom:25px;left:396px}#project-skills{bottom:25px;right:92px}.portfolio-footer{padding:13px 10px 0;text-align:center;color:var(--muted);font-size:12px;font-weight:700}.portfolio-footer span{color:var(--red);font-weight:900}@media(max-width:980px){.diagram-shell{height:auto;overflow:visible;background-size:24px 24px}.relations{display:none}.diagram-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:12px}.entity-table{position:static;width:100%}}@media(max-width:620px){body{padding:8px}.diagram-grid{grid-template-columns:1fr}.toolbar{align-items:flex-start}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:.01ms!important}}
</style>
</head>
<body>
<p class="visually-hidden" id="skillset-title" role="heading" aria-level="2">Interactive normalized skillset database diagram</p>
<section class="skillset-erd" aria-labelledby="skillset-title">
<div class="toolbar"><p class="toolbar-copy">Select any record to highlight its related roles, skills, technologies, and projects.</p><button class="clear-button" id="clear-selection" type="button">Clear selection</button></div>
<div class="diagram-shell" id="diagram-shell"><svg class="relations" id="relations" aria-hidden="true"></svg><div class="diagram-grid">
<article class="entity-table" id="roles" data-table="roles"><div class="entity-header"><span>Role</span></div><ul class="entity-body">
<li><button class="entity-row" type="button" data-type="role" data-id="software-engineer"><span class="field">Software Engineer</span></button></li>
<li><button class="entity-row" type="button" data-type="role" data-id="system-developer"><span class="field">System Developer</span></button></li>
<li><button class="entity-row" type="button" data-type="role" data-id="research-assistant"><span class="field">Research Assistant</span></button></li>
<li><button class="entity-row" type="button" data-type="role" data-id="assistant-professor"><span class="field">Assistant Professor</span></button></li></ul></article>
<article class="entity-table" id="skills" data-table="skills"><div class="entity-header"><span>Skill</span></div><ul class="entity-body">
<li><button class="entity-row" type="button" data-type="skill" data-id="web-development"><span class="field">Web Development</span></button></li>
<li><button class="entity-row" type="button" data-type="skill" data-id="accessibility"><span class="field">Accessibility</span></button></li>
<li><button class="entity-row" type="button" data-type="skill" data-id="reporting"><span class="field">Reporting</span></button></li>
<li><button class="entity-row" type="button" data-type="skill" data-id="database-development"><span class="field">Database Development</span></button></li>
<li><button class="entity-row" type="button" data-type="skill" data-id="systems-integration"><span class="field">Systems Integration</span></button></li>
<li><button class="entity-row" type="button" data-type="skill" data-id="machine-learning"><span class="field">Machine Learning</span></button></li>
<li><button class="entity-row" type="button" data-type="skill" data-id="teaching"><span class="field">Teaching &amp; Mentoring</span></button></li>
<li><button class="entity-row" type="button" data-type="skill" data-id="documentation"><span class="field">Technical Documentation</span></button></li></ul></article>
<article class="entity-table" id="technologies" data-table="technologies"><div class="entity-header"><span>Technology</span></div><ul class="entity-body">
<li><button class="entity-row" type="button" data-type="technology" data-id="html-css-js"><span class="field">HTML / CSS / JavaScript</span></button></li>
<li><button class="entity-row" type="button" data-type="technology" data-id="wix-sitecore"><span class="field">Wix Studio / Sitecore</span></button></li>
<li><button class="entity-row" type="button" data-type="technology" data-id="wcag-aria"><span class="field">WCAG / ARIA</span></button></li>
<li><button class="entity-row" type="button" data-type="technology" data-id="cognos"><span class="field">IBM Cognos</span></button></li>
<li><button class="entity-row" type="button" data-type="technology" data-id="sql-plsql"><span class="field">SQL / PL/SQL</span></button></li>
<li><button class="entity-row" type="button" data-type="technology" data-id="ipaas-banner"><span class="field">iPaaS / Banner</span></button></li>
<li><button class="entity-row" type="button" data-type="technology" data-id="python-tensorflow"><span class="field">Python / TensorFlow</span></button></li>
<li><button class="entity-row" type="button" data-type="technology" data-id="tdx-docs"><span class="field">TDX / Knowledge Articles</span></button></li></ul></article>
<article class="entity-table" id="role-skills" data-table="roleSkills"><div class="entity-header"><span>RoleSkill</span></div><ul class="entity-body">
<li><button class="entity-row" type="button" data-type="junction" data-id="rs-software"><span class="field">SoftwareEngineer → Skills</span></button></li>
<li><button class="entity-row" type="button" data-type="junction" data-id="rs-system"><span class="field">SystemDeveloper → Skills</span></button></li>
<li><button class="entity-row" type="button" data-type="junction" data-id="rs-research"><span class="field">ResearchAssistant → Skills</span></button></li>
<li><button class="entity-row" type="button" data-type="junction" data-id="rs-professor"><span class="field">AssistantProfessor → Skills</span></button></li></ul></article>
<article class="entity-table" id="projects" data-table="projects"><div class="entity-header"><span>Project</span></div><ul class="entity-body">
<li><button class="entity-row" type="button" data-type="project" data-id="reading-room"><span class="field">The Reading Room @ USD</span></button></li>
<li><button class="entity-row" type="button" data-type="project" data-id="wcag-trainer"><span class="field">WCAG Trainer</span></button></li>
<li><button class="entity-row" type="button" data-type="project" data-id="cognos-reports"><span class="field">Institutional Cognos Reports</span></button></li>
<li><button class="entity-row" type="button" data-type="project" data-id="ipaas-workflows"><span class="field">iPaaS Workflows</span></button></li>
<li><button class="entity-row" type="button" data-type="project" data-id="fog-research"><span class="field">FOG Detection Research</span></button></li>
<li><button class="entity-row" type="button" data-type="project" data-id="course-design"><span class="field">Computer Science Courses</span></button></li></ul></article>
<article class="entity-table" id="project-skills" data-table="projectSkills"><div class="entity-header"><span>ProjectSkill</span></div><ul class="entity-body">
<li><button class="entity-row" type="button" data-type="junction" data-id="ps-reading"><span class="field">ReadingRoom → Skills</span></button></li>
<li><button class="entity-row" type="button" data-type="junction" data-id="ps-wcag"><span class="field">WCAGTrainer → Skills</span></button></li>
<li><button class="entity-row" type="button" data-type="junction" data-id="ps-cognos"><span class="field">CognosReports → Skills</span></button></li>
<li><button class="entity-row" type="button" data-type="junction" data-id="ps-ipaas"><span class="field">iPaaSWorkflows → Skills</span></button></li>
<li><button class="entity-row" type="button" data-type="junction" data-id="ps-fog"><span class="field">FOGResearch → Skills</span></button></li>
<li><button class="entity-row" type="button" data-type="junction" data-id="ps-course"><span class="field">CourseDesign → Skills</span></button></li></ul></article>
</div></div>
<footer class="portfolio-footer">Designed &amp; Developed © <span>Shomoita Jahid Mitin</span></footer>
</section>
<script>
"use strict";
const graph={roles:{"software-engineer":["web-development","accessibility","documentation"],"system-developer":["reporting","database-development","systems-integration","documentation"],"research-assistant":["machine-learning","documentation"],"assistant-professor":["teaching","documentation"]},skillsToTechnologies:{"web-development":["html-css-js","wix-sitecore"],"accessibility":["wcag-aria","html-css-js"],"reporting":["cognos","sql-plsql"],"database-development":["sql-plsql"],"systems-integration":["ipaas-banner","sql-plsql"],"machine-learning":["python-tensorflow"],"teaching":["python-tensorflow","html-css-js"],"documentation":["tdx-docs"]},projects:{"reading-room":["web-development","accessibility","documentation"],"wcag-trainer":["web-development","accessibility"],"cognos-reports":["reporting","database-development"],"ipaas-workflows":["systems-integration","database-development"],"fog-research":["machine-learning","documentation"],"course-design":["teaching","documentation"]}};
const roleJunctions={"software-engineer":"rs-software","system-developer":"rs-system","research-assistant":"rs-research","assistant-professor":"rs-professor"};
const projectJunctions={"reading-room":"ps-reading","wcag-trainer":"ps-wcag","cognos-reports":"ps-cognos","ipaas-workflows":"ps-ipaas","fog-research":"ps-fog","course-design":"ps-course"};
const rows=[...document.querySelectorAll('.entity-row')],tables=[...document.querySelectorAll('.entity-table')],relationsSvg=document.getElementById('relations'),diagramShell=document.getElementById('diagram-shell'),clearButton=document.getElementById('clear-selection');let relationRecords=[];
const rowFor=id=>document.querySelector(`.entity-row[data-id="${id}"]`);
function centerOf(el){const s=diagramShell.getBoundingClientRect(),r=el.getBoundingClientRect();return{x:r.left-s.left+r.width/2,y:r.top-s.top+r.height/2}}
function makePath(a,b){const dx=Math.abs(b.x-a.x),bend=Math.max(55,dx*.35);return`M ${a.x} ${a.y} C ${a.x+bend} ${a.y}, ${b.x-bend} ${b.y}, ${b.x} ${b.y}`}
function addRelation(fromId,toId,key){const a=rowFor(fromId),b=rowFor(toId);if(!a||!b)return;const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',makePath(centerOf(a),centerOf(b)));p.setAttribute('class','relation-line');relationsSvg.appendChild(p);relationRecords.push({fromId,toId,key,path:p})}
function drawRelations(){relationsSvg.innerHTML='';relationRecords=[];if(matchMedia('(max-width: 980px)').matches)return;Object.entries(graph.roles).forEach(([r,skills])=>{const j=roleJunctions[r];addRelation(r,j,`role:${r}`);skills.forEach(s=>addRelation(j,s,`role:${r}`))});Object.entries(graph.skillsToTechnologies).forEach(([s,techs])=>techs.forEach(t=>addRelation(s,t,`skill:${s}`)));Object.entries(graph.projects).forEach(([p,skills])=>{const j=projectJunctions[p];addRelation(p,j,`project:${p}`);skills.forEach(s=>addRelation(j,s,`project:${p}`))})}
const reverseLookup=(map,child)=>Object.entries(map).filter(([,arr])=>arr.includes(child)).map(([id])=>id);
function connectedSet(type,id){const c=new Set([id]);if(type==='role'){const skills=graph.roles[id]||[];c.add(roleJunctions[id]);skills.forEach(s=>{c.add(s);(graph.skillsToTechnologies[s]||[]).forEach(t=>c.add(t));reverseLookup(graph.projects,s).forEach(p=>{c.add(p);c.add(projectJunctions[p])})})}if(type==='skill'){reverseLookup(graph.roles,id).forEach(r=>{c.add(r);c.add(roleJunctions[r])});reverseLookup(graph.projects,id).forEach(p=>{c.add(p);c.add(projectJunctions[p])});(graph.skillsToTechnologies[id]||[]).forEach(t=>c.add(t))}if(type==='technology'){Object.entries(graph.skillsToTechnologies).forEach(([s,techs])=>{if(!techs.includes(id))return;c.add(s);reverseLookup(graph.roles,s).forEach(r=>{c.add(r);c.add(roleJunctions[r])});reverseLookup(graph.projects,s).forEach(p=>{c.add(p);c.add(projectJunctions[p])})})}if(type==='project'){const skills=graph.projects[id]||[];c.add(projectJunctions[id]);skills.forEach(s=>{c.add(s);(graph.skillsToTechnologies[s]||[]).forEach(t=>c.add(t));reverseLookup(graph.roles,s).forEach(r=>{c.add(r);c.add(roleJunctions[r])})})}if(type==='junction'){Object.entries(roleJunctions).forEach(([r,j])=>{if(j===id){c.add(r);(graph.roles[r]||[]).forEach(s=>c.add(s))}});Object.entries(projectJunctions).forEach(([p,j])=>{if(j===id){c.add(p);(graph.projects[p]||[]).forEach(s=>c.add(s))}})}return c}
function applySelection(type,id){const c=connectedSet(type,id);rows.forEach(row=>{const rid=row.dataset.id,is=c.has(rid);row.classList.toggle('active',rid===id);row.classList.toggle('dimmed',!is)});tables.forEach(table=>{const has=[...table.querySelectorAll('.entity-row')].some(r=>c.has(r.dataset.id));table.classList.toggle('connected',has);table.classList.toggle('dimmed',!has)});relationRecords.forEach(rec=>{const is=c.has(rec.fromId)&&c.has(rec.toId);rec.path.classList.toggle('active',is);rec.path.classList.toggle('dimmed',!is)})}
function clearSelection(){rows.forEach(r=>r.classList.remove('active','dimmed'));tables.forEach(t=>t.classList.remove('connected','dimmed'));relationRecords.forEach(r=>r.path.classList.remove('active','dimmed'))}
rows.forEach(r=>r.addEventListener('click',()=>applySelection(r.dataset.type,r.dataset.id)));clearButton.addEventListener('click',clearSelection);window.addEventListener('resize',drawRelations);requestAnimationFrame(drawRelations);
</script>
</body>
</html>
