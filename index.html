<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz</title>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; padding: 20px; margin: 0; }
        .quiz-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .option-btn { display: block; w_idth: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; background: #fff; cursor: pointer; text-align: left; font-size: 16px; }
        .option-btn:hover { background: #f0f0f0; }
        #feedback { margin-top: 15px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h3>What does HTML stand for?</h3>
    <button class="option-btn" onclick="checkAnswer(false, this)">A) HighText Machine Language</button>
    <button class="option-btn" onclick="checkAnswer(true, this)">B) HyperText Markup Language</button>
    <button class="option-btn" onclick="checkAnswer(false, this)">C) Hyperlink and Text Markup Language</button>
    
    <div id="feedback"></div>
</div>

<script>
function checkAnswer(isCorrect, element) {
    const feedback = document.getElementById('feedback');
    const buttons = document.querySelectorAll('.option-btn');
    
    // Disable buttons after answer
    buttons.forEach(btn => btn.disabled = true);
    
    if (isCorrect) {
        element.style.background = '#d4edda';
        element.style.borderColor = '#c3e6cb';
        feedback.innerHTML = '🎉 Correct!';
        feedback.style.color = '#155724';
    } else {
        element.style.background = '#f8d7da';
        element.style.borderColor = '#f5c6cb';
        feedback.innerHTML = '❌ Incorrect. Try refreshing to try again.';
        feedback.style.color = '#721c24';
    }
}
</script>

</body>
</html>
